  repos:
  - repo: local
    hooks:
      - id: ty
        name: ty type checker
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [ --fix=lf ]
      - id: destroyed-symlinks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --config=pyproject.toml]
      - id: ruff-format

  - repo: local
    hooks:
      - id: private-docs-safeguard
        name: private-docs-safeguard
        entry: ./scripts/ci/02-pre-commit-private-docs.sh
        language: script
        types: [file]
        pass_filenames: false
      - id: docs-quality-markdown
        name: docs-quality-markdown
        entry: uv run python scripts/ci/docs_quality_check.py --profile precommit
        language: system
        types: [markdown]
        pass_filenames: true

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src"]
        additional_dependencies: ["bandit[toml]"]
  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      -   id: pip-audit

  ci:
    # Leave pip-audit to only run locally and not in CI
    # pre-commit.ci does not allow network calls
    skip: [pip-audit]
