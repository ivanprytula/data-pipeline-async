name: Security Secrets Lite

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets-scan:
    name: Secrets Scan (changed lines)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Scan added lines for secrets
        id: scan
        shell: bash
        run: |
          set -euo pipefail

          # Determine base/head SHAs based on trigger event
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          # Run shared secrets scan script
          bash scripts/ci/run_secrets_scan_local.sh "$base_sha" "$head_sha"

          # Extract findings count for output
          if [[ -f secrets-findings.json ]]; then
            findings_count=$(jq 'length' secrets-findings.json)
          else
            findings_count=0
          fi
          echo "findings_count=$findings_count" >> "$GITHUB_OUTPUT"

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: secrets-findings-lite
          path: secrets-findings.json
          retention-days: 14

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          echo "### Secrets Scan (Lite)" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.scan.outputs.findings_count || '0' }}" == "0" ]]; then
            echo "✅ No secret-like patterns detected in added lines." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Potential secret exposure(s) detected: ${{ steps.scan.outputs.findings_count }}" >> "$GITHUB_STEP_SUMMARY"
            echo "See artifact: secrets-findings-lite" >> "$GITHUB_STEP_SUMMARY"
          fi
