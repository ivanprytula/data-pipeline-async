name: Security Secrets Lite

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets-scan:
    name: Secrets Scan (changed lines)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Scan added lines for secrets
        id: scan
        shell: bash
        run: |
          set -euo pipefail

          findings_file="secrets-findings.json"
          echo "[]" > "$findings_file"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 "$head_sha" | tail -n 1)"
          fi

          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" | sort -u)

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No changed files to scan."
            echo "findings_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          declare -a PATTERNS=(
            "AWS_ACCESS_KEY|critical|AKIA[0-9A-Z]{16}"
            "GITHUB_FINE_GRAINED_PAT|critical|github_pat_[0-9A-Za-z_]{82}"
            "GITHUB_PAT|critical|ghp_[0-9A-Za-z]{36}"
            "GITHUB_OAUTH|critical|gho_[0-9A-Za-z]{36}"
            "PRIVATE_KEY|critical|-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----"
            "GENERIC_SECRET_ASSIGNMENT|high|(secret|token|password|passwd|api[_-]?key|access[_-]?key|client[_-]?secret)[[:space:]]*[:=][[:space:]]*['\"]?[A-Za-z0-9_/+=~.-]{12,}"
            "CONNECTION_STRING_WITH_CREDS|high|[a-zA-Z]+://[^/@[:space:]]+:[^/@[:space:]]+@[^[:space:]]+"
            "JWT_TOKEN|medium|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}"
          )

          finding_count=0

          for file in "${changed_files[@]}"; do
            [[ -f "$file" ]] || continue

            while IFS= read -r line; do
              [[ -n "$line" ]] || continue

              # Skip obvious placeholders and docs examples to reduce noise.
              if printf '%s' "$line" | grep -qiE -- '(example|placeholder|changeme|dummy|sample|fake|sk-test-|localhost:|test[-_]?key)'; then
                continue
              fi

              for entry in "${PATTERNS[@]}"; do
                IFS='|' read -r pname psev regex <<< "$entry"
                if printf '%s\n' "$line" | grep -qE -- "$regex"; then
                  match="$(printf '%s\n' "$line" | grep -oE -- "$regex" | head -n 1 || true)"
                  [[ -n "$match" ]] || continue

                  if [[ ${#match} -le 12 ]]; then
                    redacted="[REDACTED]"
                  else
                    redacted="${match:0:4}...${match: -4}"
                  fi

                  tmp_file="$(mktemp)"
                  jq --arg file "$file" \
                     --arg pattern "$pname" \
                     --arg severity "$psev" \
                     --arg match "$redacted" \
                     --arg line "$line" \
                     '. + [{file: $file, pattern: $pattern, severity: $severity, match: $match, line: $line}]' \
                     "$findings_file" > "$tmp_file"
                  mv "$tmp_file" "$findings_file"

                  finding_count=$((finding_count + 1))
                fi
              done
            done < <(git diff -U0 "$base_sha" "$head_sha" -- "$file" | sed -n '/^+++ /d; s/^+//p')
          done

          echo "findings_count=$finding_count" >> "$GITHUB_OUTPUT"

          if [[ $finding_count -gt 0 ]]; then
            echo "Found $finding_count potential secret exposure(s)."
            jq . "$findings_file"
            exit 1
          fi

          echo "No secret exposures detected in added lines."

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: secrets-findings-lite
          path: secrets-findings.json
          retention-days: 14

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          echo "### Secrets Scan (Lite)" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.scan.outputs.findings_count || '0' }}" == "0" ]]; then
            echo "✅ No secret-like patterns detected in added lines." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Potential secret exposure(s) detected: ${{ steps.scan.outputs.findings_count }}" >> "$GITHUB_STEP_SUMMARY"
            echo "See artifact: secrets-findings-lite" >> "$GITHUB_STEP_SUMMARY"
          fi
