name: Build CI image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    # Only trigger PR rebuilds when CI-relevant files change
    paths:
      - 'infra/**'
      - 'Dockerfile'
      - 'services/**/Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'
  workflow_dispatch: {}
  workflow_call:
    secrets:
      CALLER_GITHUB_TOKEN:
        required: true
        description: "Caller-provided token for registry authentication; must allow package publishing."

permissions:
  contents: read
  packages: write

env:
  PIP_VERSION: '26.0'
  UV_VERSION: '0.11.7'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CALLER_GITHUB_TOKEN }}

      - name: Build and push (publish)
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:latest
          file: infra/ci/ci-base-image/Dockerfile
          build-args: |
            PIP_VERSION=${{ env.PIP_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}

      - name: Build only (fork PR - upload artifact)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:pr-${{ github.run_id }}
          file: infra/ci/ci-base-image/Dockerfile
          build-args: |
            PIP_VERSION=${{ env.PIP_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}

      - name: Save built image (artifact)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:pr-${{ github.run_id }}
          docker save -o data-pipeline-ci-${{ github.run_id }}.tar $IMAGE

      - name: Upload image artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/upload-artifact@v4
        with:
          name: data-pipeline-ci-image-${{ github.run_id }}
          path: data-pipeline-ci-${{ github.run_id }}.tar
