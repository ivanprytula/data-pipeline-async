name: Build CI image

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  PIP_VERSION: '26.0'
  UV_VERSION: '0.11.7'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          # relies on GITHUB_TOKEN with packages: write
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:latest
          file: infra/ci/ci-base-image/Dockerfile
          build-args: |
            PIP_VERSION=${{ env.PIP_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}
