name: Build CI image

on:
  push:
    branches: [ main, develop ]
    # Only trigger rebuilds when CI-relevant files change
    paths:
      - 'infra/**'
      - 'Dockerfile'
      - 'services/**/Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    # Only trigger PR rebuilds when CI-relevant files change
    paths:
      - 'infra/**'
      - 'Dockerfile'
      - 'services/**/Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'
  workflow_dispatch: {}
  workflow_call:
    secrets:
      CALLER_GITHUB_TOKEN:
        required: true
        description: "Caller-provided token for registry authentication; must allow package publishing."

permissions:
  contents: read
  packages: write

env:
  PIP_VERSION: '26.0'
  UV_VERSION: '0.11.7'
  UV_LINK_MODE: 'copy'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Check GHCR connectivity
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        run: |
          echo "Testing connectivity to ghcr.io..."
          for attempt in {1..3}; do
            if curl -sI https://ghcr.io/v2/ --max-time 10 > /dev/null 2>&1; then
              echo "✓ GHCR connectivity OK"
              exit 0
            fi
            echo "Attempt $attempt/3 failed. Retrying in 5s..."
            sleep 5
          done
          echo "⚠ GHCR connectivity check timed out, proceeding with login anyway"

      - name: Check if image already exists in registry
        id: image-exists
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "ℹ Image already exists for SHA ${{ github.sha }}, skipping rebuild"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) && steps.image-exists.outputs.exists == 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CALLER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          logout: false

      - name: Build and push (publish)
        if: (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) && steps.image-exists.outputs.exists == 'false'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:latest
          file: infra/ci/ci-base-image/Dockerfile
          build-args: |
            PIP_VERSION=${{ env.PIP_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:buildcache,mode=max

      - name: Build only (fork PR - upload artifact)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:pr-${{ github.run_id }}
          file: infra/ci/ci-base-image/Dockerfile
          build-args: |
            PIP_VERSION=${{ env.PIP_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}

      - name: Save built image (artifact)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:pr-${{ github.run_id }}
          docker save -o data-pipeline-ci-${{ github.run_id }}.tar $IMAGE

      - name: Upload image artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/upload-artifact@v7
        with:
          name: data-pipeline-ci-image-${{ github.run_id }}
          path: data-pipeline-ci-${{ github.run_id }}.tar
