name: Security Full Scan (Scheduled and Manual)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  action-ref-validation:
    name: Validate action refs are immutable
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fail on mutable action refs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t workflow_files < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)

          if [ ${#workflow_files[@]} -eq 0 ]; then
            echo "No workflow files found."
            exit 0
          fi

          mutable_refs=$(grep -nE 'uses:\s*[^#]+@(v[0-9]+|latest|main|master|develop)\b' "${workflow_files[@]}" || true)

          if [ -n "$mutable_refs" ]; then
            echo "Mutable GitHub Action references detected. Pin actions to full commit SHAs."
            echo "$mutable_refs"
            exit 1
          fi

          echo "All action references are pinned to immutable SHAs."

  python-deps:
    name: Python Dependencies (pip-audit)
    runs-on: ubuntu-latest
    needs: action-ref-validation
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Export locked dependencies for audit
        run: uv export --frozen --all-groups --no-hashes --format requirements-txt > requirements-audit.txt

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements-audit.txt

  docker-images:
    name: Docker Images (Trivy)
    runs-on: ubuntu-latest
    needs:
      - action-ref-validation
      - python-deps
    if: github.event_name == 'push' # Only scan on push to main/develop
    permissions:
      contents: read
    strategy:
      matrix:
        dockerfile:
          - name: ingestor
            path: Dockerfile
          - name: inference
            path: services/inference/Dockerfile
          - name: analytics
            path: services/analytics/Dockerfile
          - name: processor
            path: services/processor/Dockerfile
          - name: dashboard
            path: services/dashboard/Dockerfile
          - name: database
            path: infra/database/Dockerfile
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker build \
            -t ${{ matrix.dockerfile.name }}:${{ github.sha }} \
            -f ${{ matrix.dockerfile.path }} \
            .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.dockerfile.name }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      - action-ref-validation
      - python-deps
      - docker-images
    if: always()
    permissions:
      contents: read
    steps:
      - name: Fail if python-deps failed
        if: needs.python-deps.result == 'failure'
        run: exit 1
