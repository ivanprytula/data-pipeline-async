name: Security Full Scan (Scheduled and Manual)

'on':
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  action-ref-validation:
    name: Validate action refs are immutable
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fail on mutable action refs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t workflow_files < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)

          if [ ${#workflow_files[@]} -eq 0 ]; then
            echo "No workflow files found."
            exit 0
          fi

          mutable_refs=$(grep -nE 'uses:\s*[^#]+@(v[0-9]+|latest|main|master|develop)\b' "${workflow_files[@]}" || true)

          if [ -n "$mutable_refs" ]; then
            echo "Mutable GitHub Action references detected. Pin actions to full commit SHAs."
            echo "$mutable_refs"
            exit 1
          fi

          echo "All action references are pinned to immutable SHAs."

  python-deps:
    name: Python Dependencies (pip-audit)
    runs-on: ubuntu-latest
    needs: action-ref-validation
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install audit tools
        run: python -m pip install --upgrade pip pip-audit uv

      - name: Export locked dependencies for audit
        run: uv export --frozen --all-groups --no-hashes --format requirements-txt > requirements-audit.txt

      - name: Run pip-audit with descriptions
        id: audit
        run: |
          set -o pipefail
          python -m pip_audit -r requirements-audit.txt --desc --format=json | tee pip-audit-report.json
        continue-on-error: true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && steps.audit.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const findings = JSON.parse(fs.readFileSync('pip-audit-report.json', 'utf8'));
            const vulnerableDeps = findings.dependencies
              .filter(dep => Array.isArray(dep.vulns) && dep.vulns.length > 0)
              .map(dep => {
                const vulns = dep.vulns
                  .map(vuln => `${vuln.id}${vuln.fix_versions?.length ? ` → fix: ${vuln.fix_versions.join(', ')}` : ''}`)
                  .join('; ');
                return `- ${dep.name} ${dep.version}: ${vulns}`;
              })
              .join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **pip-audit found vulnerabilities**\n\n${vulnerableDeps || 'See uploaded artifact for details.'}`
            })

      - name: Report pip-audit findings in summary
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const findings = JSON.parse(fs.readFileSync('pip-audit-report.json', 'utf8'));
            const vulnerableDeps = findings.dependencies.filter(dep => Array.isArray(dep.vulns) && dep.vulns.length > 0);
            const lines = ['### Python Dependency Security Scan'];
            if (vulnerableDeps.length === 0) {
              lines.push('', '✅ No vulnerabilities found');
            } else {
              lines.push('', '❌ Vulnerabilities detected:', '');
              for (const dep of vulnerableDeps) {
                const vulnText = dep.vulns
                  .map(vuln => `- ${vuln.id}${vuln.fix_versions?.length ? ` (fix: ${vuln.fix_versions.join(', ')})` : ''}`)
                  .join('\n');
                lines.push(`- ${dep.name} ${dep.version}`, vulnText);
              }
              lines.push('', 'Artifact: `pip-audit-report`');
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);

      - name: Report summary
        run: |
          if [ ${{ steps.audit.outcome }} = 'success' ]; then
            echo "pip-audit completed without findings"
          else
            echo "pip-audit found vulnerabilities; see step summary and artifact"
          fi

      - name: Fail if vulnerabilities found
        if: steps.audit.outcome == 'failure'
        run: exit 1

  docker-images:
    name: Docker Images (Trivy)
    runs-on: ubuntu-latest
    needs:
      - action-ref-validation
      - python-deps
    if: github.event_name == 'push' # Only scan on push to main/develop
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        dockerfile:
          - name: ingestor
            path: Dockerfile
          - name: ai_gateway
            path: services/ai_gateway/Dockerfile
          - name: query_api
            path: services/query_api/Dockerfile
          - name: processor
            path: services/processor/Dockerfile
          - name: dashboard
            path: services/dashboard/Dockerfile
          - name: database
            path: infra/database/Dockerfile
      fail-fast: false # Continue scanning all images even if one fails
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker build \
            -t ${{ matrix.dockerfile.name }}:${{ github.sha }} \
            -f ${{ matrix.dockerfile.path }} \
            .

      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.dockerfile.name }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.dockerfile.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0' # Set to '1' to fail on vulns (optional)

      - name: Generate SBOM (CycloneDX format)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.dockerfile.name }}:${{ github.sha }}
          format: cyclonedx
          output: sbom-${{ matrix.dockerfile.name }}.json
          scanners: image,config

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@47b3685fe9c552c72e8345287d38c6cacf27abf5 # v2.24.2
        if: always()
        with:
          sarif_file: trivy-${{ matrix.dockerfile.name }}.sarif
          category: trivy-${{ matrix.dockerfile.name }}

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-cyclonedx
          path: sbom-${{ matrix.dockerfile.name }}.json
          retention-days: 90

      - name: Report summary
        run: |
          echo "### Trivy Container Scan (${{ matrix.dockerfile.name }})" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ matrix.dockerfile.name }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Status: ✅ Scanned and uploaded to Code Scanning" >> $GITHUB_STEP_SUMMARY

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      - action-ref-validation
      - python-deps
      - docker-images
    if: always()
    permissions:
      contents: read
    steps:
      - name: Generate security summary
        run: |
          echo "## 🔒 Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Dependencies | ${{ needs.python-deps.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Images | ${{ needs.docker-images.result == 'success' && '✅ Passed' || '⏭️ Skipped on PR' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results available in [Code Scanning tab](https://github.com/${{ github.repository }}/security/code-scanning)." >> $GITHUB_STEP_SUMMARY

      - name: Fail if python-deps failed
        if: needs.python-deps.result == 'failure'
        run: |
          echo "❌ Security scan failed: Python dependencies have vulnerabilities"
          exit 1

  compliance-dashboard:
    name: Compliance Dashboard
    runs-on: ubuntu-latest
    needs:
      - python-deps
      - docker-images
    if: github.event_name == 'push' && always()
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-cyclonedx
          path: ./sbom-artifacts

      - name: Generate compliance report
        run: |
          mkdir -p compliance-reports
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Create compliance summary JSON
          cat > compliance-reports/compliance-${{ github.sha }}.json <<EOF
          {
            "timestamp": "$timestamp",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "workflow_run_id": "${{ github.run_id }}",
            "sbom_generated": true,
            "sbom_format": "CycloneDX",
            "python_deps_status": "${{ needs.python-deps.result }}",
            "docker_images_status": "${{ needs.docker-images.result }}",
            "images_scanned": 6,
            "sbom_artifacts": [
              "sbom-ingestor.json",
              "sbom-ai_gateway.json",
              "sbom-query_api.json",
              "sbom-processor.json",
              "sbom-dashboard.json",
              "sbom-database.json"
            ]
          }
          EOF

          cat compliance-reports/compliance-${{ github.sha }}.json

      - name: Upload compliance report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: compliance-reports
          path: compliance-reports/
          retention-days: 365 # Keep for 1 year (compliance requirement)

      - name: Report compliance summary
        run: |
          echo "## 📋 Compliance Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Phase 3: SBOM & Compliance Tracking" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **SBOM Generation (Phase 3.1)**" >> $GITHUB_STEP_SUMMARY
          echo "- Generated CycloneDX SBOMs for all 6 services" >> $GITHUB_STEP_SUMMARY
          echo "- Format: `cyclonedx` (standard software bill of materials)" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 90 days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Compliance Dashboard (Phase 3.2)**" >> $GITHUB_STEP_SUMMARY
          echo "- Scan timestamp: \`$(date -u +"%Y-%m-%d %H:%M:%S UTC")\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Compliance report stored for audit trail (365 day retention)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SBOM Artifacts Available:**" >> $GITHUB_STEP_SUMMARY
          echo "- Download from: Actions → [Latest Run] → Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Use for: License scanning, vulnerability tracking, compliance audits" >> $GITHUB_STEP_SUMMARY
