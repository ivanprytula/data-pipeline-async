name: CI

on:
  push:
    branches:
      - main
      - 'release/*'
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      run_slow_checks:
        description: Run slow checks (migrations/integration/e2e/dependency audit)
        required: true
        type: boolean
        default: false
      run_docker_build:
        description: Run Docker build matrix (requires run_slow_checks=true)
        required: true
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.14'
  PIP_VERSION: '26.0'
  UV_VERSION: '0.11.7'
  UV_LINK_MODE: 'copy'

jobs:
  # ---------------------------------------------------------------------------
  # Wave 0 — no upstream deps, starts immediately on trigger
  # ---------------------------------------------------------------------------
  change-impact:
    name: 01 Change impact routing
    runs-on: ubuntu-latest
    outputs:
      backend_change: ${{ steps.filter.outputs.backend_change }}
      db_change: ${{ steps.filter.outputs.db_change }}
      infra_change: ${{ steps.filter.outputs.infra_change }}
      docs_change: ${{ steps.filter.outputs.docs_change }}
      docs_files: ${{ steps.docs_files.outputs.files }}
      prompts_change: ${{ steps.filter.outputs.prompts_change }}
      shared_libs_change: ${{ steps.filter.outputs.shared_libs_change }}
      ingestor_change: ${{ steps.filter.outputs.ingestor_change }}
      ai_gateway_change: ${{ steps.filter.outputs.ai_gateway_change }}
      query_api_change: ${{ steps.filter.outputs.query_api_change }}
      processor_change: ${{ steps.filter.outputs.processor_change }}
      dashboard_change: ${{ steps.filter.outputs.dashboard_change }}
      contracts_change: ${{ steps.filter.outputs.contracts_change }}
      contracts_version_change: ${{ steps.filter.outputs.contracts_version_change }}
      contracts_changelog_change: ${{ steps.filter.outputs.contracts_changelog_change }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend_change:
              - 'services/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile'
              - 'docker-compose*.yml'
            db_change:
              - 'alembic/**'
              - 'infra/database/**'
              - 'ingestor/models.py'
              - 'ingestor/database.py'
            docs_change:
              - 'docs/**'
              - 'README.md'
              - '.github/pull_request_template.md'
            prompts_change:
              - '.github/prompts/**'
            infra_change:
              - '.github/workflows/**'
              - 'infra/**'
              - 'scripts/**'
            shared_libs_change:
              - 'libs/platform/**'
              - 'libs/contracts/**'
            ingestor_change:
              - 'ingestor/**'
              - 'Dockerfile'
            ai_gateway_change:
              - 'services/ai_gateway/**'
              - 'services/ai_gateway/Dockerfile'
            query_api_change:
              - 'services/query_api/**'
              - 'services/query_api/Dockerfile'
            processor_change:
              - 'services/processor/**'
              - 'services/processor/Dockerfile'
              - 'services/processor/pyproject.toml'
            dashboard_change:
              - 'services/dashboard/**'
              - 'services/dashboard/Dockerfile'
            contracts_change:
              - 'libs/contracts/**/*.py'
            contracts_version_change:
              - 'libs/contracts/VERSION'
            contracts_changelog_change:
              - 'libs/contracts/CHANGELOG.md'

      - name: Extract changed docs files
        id: docs_files
        run: |
          if [[ "${{ steps.filter.outputs.docs_change }}" != "true" ]]; then
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            git diff --name-only origin/main HEAD 2>/dev/null | grep -E '^(docs/|README\.md|\.github/pull_request_template\.md)' | tr '\n' ' ' | xargs > files.txt || true
            echo "files=$(cat files.txt)" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Wave 1 — parallel, all need only change-impact
  # ---------------------------------------------------------------------------
  build-prebuilt-image:
    name: 02 Build CI image
    needs:
      - change-impact
    uses: ./.github/workflows/build-ci-image.yml
    permissions:
      contents: read
      packages: write
    secrets:
      CALLER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  service-matrix:
    name: 03 Service matrix from changed paths
    runs-on: ubuntu-latest
    needs:
      - change-impact
    outputs:
      changed_services_matrix: ${{ steps.matrix.outputs.changed_services_matrix }}
      has_changed_services: ${{ steps.matrix.outputs.has_changed_services }}
    steps:
      - name: Build changed-service matrix
        id: matrix
        env:
          SHARED_LIBS_CHANGE: ${{ needs.change-impact.outputs.shared_libs_change }}
          INGESTOR_CHANGE: ${{ needs.change-impact.outputs.ingestor_change }}
          AI_GATEWAY_CHANGE: ${{ needs.change-impact.outputs.ai_gateway_change }}
          QUERY_API_CHANGE: ${{ needs.change-impact.outputs.query_api_change }}
          PROCESSOR_CHANGE: ${{ needs.change-impact.outputs.processor_change }}
          DASHBOARD_CHANGE: ${{ needs.change-impact.outputs.dashboard_change }}
        run: |
          set -euo pipefail

          include_service() {
            local service_json="$1"
            matrix_json=$(jq --argjson svc "$service_json" '. + [$svc]' <<< "$matrix_json")
          }

          matrix_json='[]'
          include_all='false'
          if [[ "$SHARED_LIBS_CHANGE" == "true" ]]; then
            include_all='true'
          fi

          if [[ "$include_all" == "true" || "$INGESTOR_CHANGE" == "true" ]]; then
            include_service '{"name":"ingestor","path":"ingestor","dockerfile":"Dockerfile","image_name":"data-zoo/ingestor"}'
          fi
          if [[ "$include_all" == "true" || "$AI_GATEWAY_CHANGE" == "true" ]]; then
            include_service '{"name":"ai_gateway","path":"services/ai_gateway","dockerfile":"services/ai_gateway/Dockerfile","image_name":"data-zoo/ai_gateway"}'
          fi
          if [[ "$include_all" == "true" || "$QUERY_API_CHANGE" == "true" ]]; then
            include_service '{"name":"query_api","path":"services/query_api","dockerfile":"services/query_api/Dockerfile","image_name":"data-zoo/query_api"}'
          fi
          if [[ "$include_all" == "true" || "$PROCESSOR_CHANGE" == "true" ]]; then
            include_service '{"name":"processor","path":"services/processor","dockerfile":"services/processor/Dockerfile","image_name":"data-zoo/processor"}'
          fi
          if [[ "$include_all" == "true" || "$DASHBOARD_CHANGE" == "true" ]]; then
            include_service '{"name":"dashboard","path":"services/dashboard","dockerfile":"services/dashboard/Dockerfile","image_name":"data-zoo/dashboard"}'
          fi

          count=$(jq 'length' <<< "$matrix_json")
          if [[ "$count" -gt 0 ]]; then
            echo "has_changed_services=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed_services=false" >> "$GITHUB_OUTPUT"
          fi

          matrix_json="$(jq -c . <<<"$matrix_json")"
          echo "changed_services_matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  docs-impact-gate:
    name: 04 Docs impact gate (PR)
    runs-on: ubuntu-latest
    needs:
      - change-impact
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Validate docs acknowledgement for code-impacting changes
        env:
          BACKEND_CHANGE: ${{ needs.change-impact.outputs.backend_change }}
          DB_CHANGE: ${{ needs.change-impact.outputs.db_change }}
          INFRA_CHANGE: ${{ needs.change-impact.outputs.infra_change }}
          DOCS_CHANGE: ${{ needs.change-impact.outputs.docs_change }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [[ "$BACKEND_CHANGE" != "true" && "$DB_CHANGE" != "true" && "$INFRA_CHANGE" != "true" ]]; then
            echo "No code or infra impact detected; docs gate passed."
            exit 0
          fi

          if [[ "$DOCS_CHANGE" == "true" ]]; then
            echo "Docs updated in this PR; docs gate passed."
            exit 0
          fi

          if printf '%s' "$PR_BODY" | grep -Eiq -- '- \[[xX]\] Docs updated if behavior or policy changed'; then
            echo "PR template documents no docs impact via checked acknowledgement."
            exit 0
          fi

          echo "Code/infra changes detected without docs changes." >&2
          echo "Either add docs updates or check the docs acknowledgement item in the PR template." >&2
          exit 1

  impact-summary:
    name: 05 Impact summary
    runs-on: ubuntu-latest
    needs:
      - change-impact
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Publish impact routing summary
        run: |
          echo "### Change Impact Routing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend change: ${{ needs.change-impact.outputs.backend_change }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- DB change: ${{ needs.change-impact.outputs.db_change }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docs change: ${{ needs.change-impact.outputs.docs_change }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Prompts change: ${{ needs.change-impact.outputs.prompts_change }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Infra change: ${{ needs.change-impact.outputs.infra_change }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Contracts change: ${{ needs.change-impact.outputs.contracts_change }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Shared libs change: ${{ needs.change-impact.outputs.shared_libs_change }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service changes: ingestor=${{ needs.change-impact.outputs.ingestor_change }}, ai_gateway=${{ needs.change-impact.outputs.ai_gateway_change }}, query_api=${{ needs.change-impact.outputs.query_api_change }}, processor=${{ needs.change-impact.outputs.processor_change }}, dashboard=${{ needs.change-impact.outputs.dashboard_change }}" >> "$GITHUB_STEP_SUMMARY"

  contracts-versioning-gate:
    name: 06 Contracts versioning gate
    runs-on: ubuntu-latest
    needs:
      - change-impact
    steps:
      - name: Enforce contracts version bump and changelog update
        env:
          CONTRACTS_CHANGE: ${{ needs.change-impact.outputs.contracts_change }}
          CONTRACTS_VERSION_CHANGE: ${{ needs.change-impact.outputs.contracts_version_change }}
          CONTRACTS_CHANGELOG_CHANGE: ${{ needs.change-impact.outputs.contracts_changelog_change }}
        run: |
          set -euo pipefail

          if [[ "$CONTRACTS_CHANGE" != "true" ]]; then
            echo "No contracts changes detected; skipping version/changelog gate."
            exit 0
          fi

          if [[ "$CONTRACTS_VERSION_CHANGE" != "true" ]]; then
            echo "Contracts changed but libs/contracts/VERSION was not updated." >&2
            exit 1
          fi

          if [[ "$CONTRACTS_CHANGELOG_CHANGE" != "true" ]]; then
            echo "Contracts changed but libs/contracts/CHANGELOG.md was not updated." >&2
            exit 1
          fi

          echo "Contracts versioning gate passed."

  # ---------------------------------------------------------------------------
  # Wave 2 — after build-prebuilt-image (container image must exist)
  # ---------------------------------------------------------------------------
  prechecks:
    name: 07 Prechecks — lint, guardrails, compile, type
    runs-on: ubuntu-latest
    needs:
      - build-prebuilt-image
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prechecks — lint, guardrails, compile, type
        run: |
          set -euo pipefail
          uv run ruff check .
          uv run ruff format --check .
          uv run python scripts/ci/check_service_boundaries.py
          uv run ty check
          uv run python -m compileall -q .

  # `service-boundaries` merged into `prechecks` above
  # `service-lint-test` removed — ran identical full-repo commands; use
  #   `ruff check ${{ matrix.service.path }}` if per-service scoping is needed

  # ---------------------------------------------------------------------------
  # Wave 3 — parallel after prechecks
  # ---------------------------------------------------------------------------
  unit:
    name: 08 Unit tests — Python 3.14
    runs-on: ubuntu-latest
    needs:
      - prechecks
      - contracts-versioning-gate
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache pytest results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pytest-

      - name: Run unit tests
        run: uv run pytest -q -m "unit"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-unit-py${{ env.PYTHON_VERSION }}
          path: htmlcov

  # ---------------------------------------------------------------------------
  # Wave 4+ — sequential slow checks (workflow_dispatch only)
  # ---------------------------------------------------------------------------
  migrations:
    name: 09 Verify Alembic migrations (PostgreSQL 17)
    runs-on: ubuntu-latest
    needs:
      - prechecks
      - unit
      - change-impact
      - build-prebuilt-image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks }}
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.CI_POSTGRES_PASSWORD }}@postgres:5432/data_pipeline
      DATABASE_URL_RAW: postgresql://postgres:${{ secrets.CI_POSTGRES_PASSWORD }}@postgres:5432/data_pipeline
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: data_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d data_pipeline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6


      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in $(seq 1 30); do
            pg_isready -h postgres -p 5432 -U postgres && break || sleep 1
          done

      - name: Test fresh migrations (upgrade from base to head)
        run: |
          set -euo pipefail
          echo "Testing fresh migrations: base -> head"
          uv run alembic upgrade head

      - name: Verify schema objects (materialized views, partitions, extensions)
        run: |
          set -euo pipefail
          uv run python - <<'PYTHON'
          import os
          import psycopg

          db_url = os.environ["DATABASE_URL_RAW"]
          conn = psycopg.connect(db_url)
          cur = conn.cursor()

          cur.execute("""
            SELECT EXISTS(
              SELECT 1 FROM pg_extension WHERE extname = 'vector'
            )
          """)
          has_vector = cur.fetchone()[0]
          print(f"✓ pgvector extension: {'present' if has_vector else 'MISSING'}")
          assert has_vector, "pgvector extension not found"

          cur.execute("""
            SELECT EXISTS(
              SELECT 1 FROM pg_matviews
              WHERE matviewname = 'records_hourly_stats'
            )
          """)
          has_view = cur.fetchone()[0]
          print(f"✓ records_hourly_stats view: {'present' if has_view else 'MISSING'}")
          assert has_view, "Materialized view records_hourly_stats not found"

          cur.execute("""
            SELECT EXISTS(
              SELECT 1 FROM information_schema.tables
              WHERE table_name = 'records_archive'
            )
          """)
          has_archive = cur.fetchone()[0]
          print(f"✓ records_archive partitioned table: {'present' if has_archive else 'MISSING'}")
          assert has_archive, "Partitioned table records_archive not found"

          cur.execute("""
            SELECT COUNT(*)
            FROM pg_inherits
            JOIN pg_class parent ON pg_inherits.inhparent = parent.oid
            JOIN pg_class child ON pg_inherits.inhrelid = child.oid
            WHERE parent.relname = 'records_archive'
          """)
          partition_count = cur.fetchone()[0]
          print(f"✓ Partitions created: {partition_count} partitions exist")
          assert partition_count > 0, "No partitions found for records_archive"

          cur.execute("""
            SELECT indexname FROM pg_indexes
            WHERE tablename = 'records'
            ORDER BY indexname
          """)
          indexes = [row[0] for row in cur.fetchall()]
          print(f"✓ Indexes on records table: {', '.join(indexes) if indexes else 'none'}")

          cur.execute("""
            SELECT constraint_name FROM information_schema.table_constraints
            WHERE table_name = 'records' AND constraint_type = 'UNIQUE'
            ORDER BY constraint_name
          """)
          unique_constraints = [row[0] for row in cur.fetchall()]
          print(f"✓ Unique constraints on records: {', '.join(unique_constraints) if unique_constraints else 'none'}")
          assert len(unique_constraints) > 0, "No unique constraints found on records table"

          cur.execute("""
            SELECT EXISTS(
              SELECT 1 FROM information_schema.tables
              WHERE table_name = 'processed_events'
            )
          """)
          has_events_table = cur.fetchone()[0]
          print(f"✓ processed_events table: {'present' if has_events_table else 'MISSING'}")
          assert has_events_table, "processed_events table not found"

          cur.close()
          conn.close()
          print("\n✅ All schema objects verified successfully")
          PYTHON

      - name: Test migration idempotency (downgrade + upgrade)
        run: |
          set -euo pipefail
          echo "Testing migration idempotency: head -> base -> head"

          uv run alembic downgrade base

          uv run python - <<'PYTHON'
          import os
          import psycopg

          db_url = os.environ["DATABASE_URL_RAW"]
          conn = psycopg.connect(db_url)
          cur = conn.cursor()

          cur.execute("""
            SELECT COUNT(*) FROM information_schema.tables
            WHERE table_schema = 'public' AND table_name IN ('records', 'processed_events')
          """)
          remaining_tables = cur.fetchone()[0]
          assert remaining_tables == 0, f"Expected 0 tables after downgrade, found {remaining_tables}"
          print("✓ All tables removed on downgrade")

          cur.close()
          conn.close()
          PYTHON

          uv run alembic upgrade head

          uv run python - <<'PYTHON'
          import os
          import psycopg

          db_url = os.environ["DATABASE_URL_RAW"]
          conn = psycopg.connect(db_url)
          cur = conn.cursor()

          cur.execute("""
            SELECT COUNT(*) FROM information_schema.tables
            WHERE table_schema = 'public' AND table_name IN ('records', 'processed_events')
          """)
          table_count = cur.fetchone()[0]
          assert table_count == 2, f"Expected 2 tables after re-upgrade, found {table_count}"
          print("✓ All tables restored on re-upgrade")

          cur.close()
          conn.close()
          PYTHON

      - name: Test insert into all tables (constraint check)
        run: |
          set -euo pipefail
          uv run python - <<'PYTHON'
          import os
          from datetime import datetime, timezone

          import psycopg

          db_url = os.environ["DATABASE_URL_RAW"]
          conn = psycopg.connect(db_url)
          cur = conn.cursor()

          now = datetime.now(timezone.utc).replace(tzinfo=None)
          cur.execute("""
            INSERT INTO records (source, timestamp, raw_data, tags, processed, created_at)
            VALUES (%s, %s, %s, %s, %s, %s)
            RETURNING id
          """, ("test-source", now, '{"value": 42}', '[]', False, now))
          record_id = cur.fetchone()[0]
          print(f"✓ Successfully inserted record (id={record_id})")

          cur.execute("""
            INSERT INTO processed_events (
              kafka_topic, kafka_partition, kafka_offset, idempotency_key,
              event_type, payload, status, processing_attempts,
              dead_letter_queue, created_at
            )
            VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s)
            RETURNING id
          """, ("test-topic", 0, 0, "test-key-1", "test.event", '{}', "pending", 0, False, now))
          event_id = cur.fetchone()[0]
          print(f"✓ Successfully inserted processed_event (id={event_id})")

          try:
            cur.execute("SAVEPOINT records_unique_check")
            cur.execute("""
              INSERT INTO records (source, timestamp, raw_data, tags, processed, created_at)
              VALUES (%s, %s, %s, %s, %s, %s)
            """, ("test-source", now, '{"value": 99}', '[]', False, now))
            print("✗ FAILED: Unique constraint not enforced on (source, timestamp)")
            raise AssertionError("Unique constraint not enforced")
          except psycopg.IntegrityError:
            cur.execute("ROLLBACK TO SAVEPOINT records_unique_check")
            print("✓ Unique constraint enforced on records (source, timestamp)")
          finally:
            cur.execute("RELEASE SAVEPOINT records_unique_check")

          try:
            cur.execute("SAVEPOINT processed_events_unique_check")
            cur.execute("""
              INSERT INTO processed_events (
                kafka_topic, kafka_partition, kafka_offset, idempotency_key,
                event_type, payload, status, processing_attempts,
                dead_letter_queue, created_at
              )
              VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s)
            """, ("topic2", 0, 0, "test-key-1", "test.event", '{}', "pending", 0, False, now))
            print("✗ FAILED: idempotency_key unique constraint not enforced")
            raise AssertionError("idempotency_key constraint not enforced")
          except psycopg.IntegrityError:
            cur.execute("ROLLBACK TO SAVEPOINT processed_events_unique_check")
            print("✓ Unique constraint enforced on processed_events (idempotency_key)")
          finally:
            cur.execute("RELEASE SAVEPOINT processed_events_unique_check")

          conn.commit()
          cur.close()
          conn.close()
          print("\n✅ All constraint tests passed")
          PYTHON

  integration:
    name: 10 Integration tests — Python 3.14
    runs-on: ubuntu-latest
    needs:
      - prechecks
      - migrations
      - change-impact
      - build-prebuilt-image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks }}
    timeout-minutes: 60
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: test_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_database"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in $(seq 1 30); do
            pg_isready -h postgres -p 5432 -U postgres && break || sleep 1
          done

      - name: Run integration tests
        env:
          DATABASE_URL_TEST: postgresql+asyncpg://postgres:${{ secrets.CI_POSTGRES_PASSWORD }}@postgres:5432/test_database
        run: |
          set -euo pipefail
          uv run pytest -q -m "integration"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-integration-py${{ env.PYTHON_VERSION }}
          path: htmlcov

  e2e:
    name: 11 E2E tests — Python 3.14
    runs-on: ubuntu-latest
    needs:
      - prechecks
      - integration
      - change-impact
      - build-prebuilt-image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks }}
    timeout-minutes: 90
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: test_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_database"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in $(seq 1 30); do
            pg_isready -h postgres -p 5432 -U postgres && break || sleep 1
          done

      - name: Run E2E tests
        env:
          DATABASE_URL_TEST: postgresql+asyncpg://postgres:${{ secrets.CI_POSTGRES_PASSWORD }}@postgres:5432/test_database
        run: |
          set -euo pipefail
          uv run pytest -q -m "e2e"

  # ---------------------------------------------------------------------------
  # Wave 4+ — compose smoke-test (workflow_dispatch + run_slow_checks only)
  # ---------------------------------------------------------------------------
  compose-smoke-test:
    name: Compose smoke-test — health + JSON logs
    runs-on: ubuntu-latest
    needs:
      - prechecks
      - unit
      - change-impact
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build service images
        run: docker compose --profile worker --profile vector build

      - name: Start services
        run: docker compose --profile worker --profile vector up -d

      - name: Wait for all services — readyz 200
        run: |
          set -euo pipefail
          declare -A PORTS=([ingestor]=8000 [ai-gateway]=8001 [processor]=8002 [dashboard]=8003 [query-api]=8005)
          for svc in "${!PORTS[@]}"; do
            port="${PORTS[$svc]}"
            echo "Polling $svc /readyz on port $port (90s timeout)..."
            ok=false
            for attempt in $(seq 1 18); do
              code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:${port}/readyz" || true)
              if [[ "$code" == "200" ]]; then
                echo "  ✓ $svc readyz=200 (attempt $attempt)"
                ok=true
                break
              fi
              echo "  ○ $svc attempt $attempt: $code — retrying in 5s"
              sleep 5
            done
            [[ "$ok" == "true" ]] || { echo "✗ $svc did not reach readyz within 90s" >&2; exit 1; }
          done

      - name: Assert readyz response body has status key
        run: |
          set -euo pipefail
          declare -A PORTS=([ingestor]=8000 [ai-gateway]=8001 [processor]=8002 [dashboard]=8003 [query-api]=8005)
          for svc in "${!PORTS[@]}"; do
            port="${PORTS[$svc]}"
            body=$(curl -s "http://localhost:${port}/readyz")
            BODY="$body" SVC="$svc" python3 -c "
          import os, sys, json
          body = os.environ['BODY']
          svc = os.environ['SVC']
          try:
              obj = json.loads(body)
          except json.JSONDecodeError:
              print(f'✗ {svc} /readyz is not JSON: {body!r}', file=sys.stderr)
              sys.exit(1)
          if 'status' not in obj:
              print(f'✗ {svc} /readyz missing status key: {obj}', file=sys.stderr)
              sys.exit(1)
          status = obj.get('status')
          print(f'✓ {svc} /readyz status={status}')
          "
          done

      - name: Validate structured JSON logs — schema assertion
        run: |
          set -euo pipefail
          for svc in ingestor ai-gateway processor dashboard query-api; do
            echo "Validating log schema for $svc..."
            raw=$(docker compose logs --no-log-prefix "$svc" 2>/dev/null | head -10 || true)
            if [[ -z "$raw" ]]; then
              echo "  ⚠ No log output captured for $svc; skipping"
              continue
            fi
            echo "$raw" | SVC="$svc" python3 -c "
          import os, sys, json
          svc = os.environ['SVC']
          required = ['service', 'level', 'message']
          lines = [l for l in sys.stdin.read().splitlines() if l.strip()]
          if not lines:
              print(f'  ⚠ {svc}: no non-empty log lines; skipping')
              sys.exit(0)
          parsed = 0
          for line in lines:
              try:
                  obj = json.loads(line)
              except json.JSONDecodeError:
                  print(f'✗ {svc}: non-JSON log line: {line!r}', file=sys.stderr)
                  sys.exit(1)
              for field in required:
                  if field not in obj:
                      print(f'✗ {svc}: log line missing field {field!r}: {line!r}', file=sys.stderr)
                      sys.exit(1)
              parsed += 1
          print(f'✓ {svc}: {parsed} log line(s) valid JSON with required fields')
          "
          done

      - name: Tear down services
        if: always()
        run: docker compose --profile worker --profile vector down -v

  # ---------------------------------------------------------------------------
  # Wave 5 — parallel after e2e
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: 12 Dependency Audit
    runs-on: ubuntu-latest
    needs:
      - prechecks
      - e2e
      - build-prebuilt-image
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:${{ github.sha }}
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Export locked dependencies for audit
        run: uv export --frozen --all-groups --no-hashes --format requirements-txt > requirements-audit.txt

      - name: Run pip-audit (official GH action)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements-audit.txt

  build-images:
    name: 13 Docker build — ${{ matrix.service.name }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.service-matrix.outputs.changed_services_matrix) }}
    needs:
      - prechecks
      - unit
      - migrations
      - integration
      - e2e
      - compose-smoke-test
      - service-matrix
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks && inputs.run_docker_build && needs.service-matrix.outputs.has_changed_services == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      image-name: ${{ matrix.service.image_name }}
      dockerfile: ${{ matrix.service.dockerfile }}
      context: .
      aws-region: ${{ vars.AWS_REGION }}
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      push-image: false
    secrets:
      aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # Wave 6 — after build-images
  # ---------------------------------------------------------------------------
  build-summary:
    name: 14 Docker build summary
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks && inputs.run_docker_build && needs.build-images.result != 'skipped' }}
    steps:
      - name: Report build matrix
        run: |
          echo "### Docker Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "Changed services built: ${{ needs.service-matrix.outputs.changed_services_matrix }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Push mode: disabled (CI build-only)" >> "$GITHUB_STEP_SUMMARY"
          echo "Build result: ${{ needs.build-images.result }}" >> "$GITHUB_STEP_SUMMARY"
