  dependency-audit:
    name: 06 Dependency Audit
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip / uv wheel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip/wheels
          key: ${{ runner.os }}-pip-uv-${{ env.UV_VERSION }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-uv-${{ env.UV_VERSION }}-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-pip-uv-${{ env.UV_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install uv and sync dependencies
        run: |
          python -m pip install "pip==${{ env.PIP_VERSION }}" "uv==${{ env.UV_VERSION }}"
          uv sync --frozen

      - name: Export locked dependencies for audit
        run: uv export --frozen --all-groups --no-hashes --format requirements-txt > requirements-audit.txt

      - name: Run pip-audit (official GH action)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements-audit.txt

  build-images:
    name: 07 Docker build — ${{ matrix.service.name }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.service-matrix.outputs.changed_services_matrix) }}
    needs:
      - quality
      - unit
      - migrations
      - integration
      - e2e
      - service-matrix
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks && inputs.run_docker_build && needs.service-matrix.outputs.has_changed_services == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      image-name: ${{ matrix.service.image_name }}
      dockerfile: ${{ matrix.service.dockerfile }}
      context: .
      aws-region: ${{ vars.AWS_REGION }}
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      push-image: false
    secrets:
      aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

  build-summary:
    name: 07 Docker build summary
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_checks && inputs.run_docker_build && needs.build-images.result != 'skipped' }}
    steps:
      - name: Report build matrix
        run: |
          echo "### Docker Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "Built images:" >> "$GITHUB_STEP_SUMMARY"
          echo "- data-zoo/ingestor" >> "$GITHUB_STEP_SUMMARY"
          echo "- data-zoo/ai_gateway" >> "$GITHUB_STEP_SUMMARY"
          echo "- data-zoo/query_api" >> "$GITHUB_STEP_SUMMARY"
          echo "- data-zoo/processor" >> "$GITHUB_STEP_SUMMARY"
          echo "- data-zoo/dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "- Push mode: disabled (CI build-only)" >> "$GITHUB_STEP_SUMMARY"
