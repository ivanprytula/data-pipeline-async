name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        db: [sqlite, postgres]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure Postgres (if selected)
        if: matrix.db == 'postgres'
        run: echo "DATABASE_URL_TEST=postgresql+asyncpg://postgres:postgres@localhost:5432/test_database" >> $GITHUB_ENV

      - name: Start Postgres service (for postgres matrix)
        if: matrix.db == 'postgres'
        uses: Harmon758/postgres-action@v2
        with:
          postgresql version: '15'
          postgresql db: 'test_database'
          postgresql user: 'postgres'
          postgresql password: 'postgres'

      - name: Wait for Postgres ready
        if: matrix.db == 'postgres'
        run: |
          sudo apt-get update -y && sudo apt-get install -y postgresql-client
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && break || sleep 1
          done

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=app --cov-fail-under=80 --cov-report=term-missing
