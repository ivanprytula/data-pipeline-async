name: Docker Build Reusable

on:
  workflow_call:
    inputs:
      image-name:
        description: Container image name (without registry).
        required: true
        type: string
      dockerfile:
        description: Path to Dockerfile.
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
      aws-region:
        description: AWS region.
        required: true
        type: string
      aws-role-arn:
        description: IAM role ARN for OIDC auth.
        required: false
        type: string
      push-image:
        description: Push image to ECR.
        required: false
        type: boolean
        default: false
      sign-image:
        description: Sign pushed image with cosign keyless signing.
        required: false
        type: boolean
        default: true
    secrets:
      aws_account_id:
        description: AWS account ID used to build the ECR registry host.
        required: false
    outputs:
      image-uri:
        description: Full image URI with immutable tag.
        value: ${{ jobs.build.outputs.image-uri }}
      image-digest-uri:
        description: Full immutable image URI in digest form.
        value: ${{ jobs.build.outputs.image-digest-uri }}
      image-digest:
        description: Image digest (sha256:...).
        value: ${{ jobs.build.outputs.image-digest }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.meta.outputs.image_uri }}
      image-digest-uri: ${{ steps.push.outputs.image_digest_uri }}
      image-digest: ${{ steps.push.outputs.image_digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve image metadata
        id: meta
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          local_image_uri="${{ inputs.image-name }}:sha-${short_sha}"
          aws_account_id="${{ secrets.aws_account_id }}"

          if [[ "${{ inputs.push-image }}" == "true" ]]; then
            if [[ -z "${aws_account_id}" || ! "${aws_account_id}" =~ ^[0-9]{12}$ ]]; then
              echo "aws_account_id secret must be a 12-digit AWS account ID when push-image=true" >&2
              exit 1
            fi
            ecr_registry="${aws_account_id}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com"
            image_uri="${ecr_registry}/${{ inputs.image-name }}:sha-${short_sha}"
          else
            ecr_registry=""
            image_uri="${local_image_uri}"
          fi

          artifact_stem="$(echo "${{ inputs.image-name }}" | tr '/:' '--')"
          echo "ecr_registry=${ecr_registry}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"
          echo "artifact_stem=${artifact_stem}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.push-image && inputs.aws-role-arn != '' }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ inputs.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        if: ${{ inputs.push-image && inputs.aws-role-arn != '' }}
        run: |
          aws ecr get-login-password --region "${{ inputs.aws-region }}" | \
            docker login --username AWS --password-stdin "${{ steps.meta.outputs.ecr_registry }}"

      - name: Build image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "${{ steps.meta.outputs.image_uri }}" \
            "${{ inputs.context }}"

      - name: Push image
        id: push
        if: ${{ inputs.push-image && inputs.aws-role-arn != '' }}
        run: |
          set -euo pipefail
          docker push "${{ steps.meta.outputs.image_uri }}"
          digest_uri=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.image_uri }}")
          digest_only="${digest_uri##*@}"
          echo "image_digest_uri=${digest_uri}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${digest_only}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: ${{ inputs.push-image && inputs.sign-image && inputs.aws-role-arn != '' }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image (keyless)
        if: ${{ inputs.push-image && inputs.sign-image && inputs.aws-role-arn != '' }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.push.outputs.image_digest_uri }}"

      - name: Verify signature (build-time sanity check)
        if: ${{ inputs.push-image && inputs.sign-image && inputs.aws-role-arn != '' }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push.outputs.image_digest_uri }}" >/dev/null

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: cyclonedx
          output: sbom-${{ steps.meta.outputs.artifact_stem }}.json
          scanners: image,config

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ steps.meta.outputs.artifact_stem }}
          path: sbom-${{ steps.meta.outputs.artifact_stem }}.json
          retention-days: 30
