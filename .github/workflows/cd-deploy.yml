name: CD Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image-uri:
        description: Immutable image URI (tag or digest)
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ inputs.environment == 'dev' || inputs.environment == 'staging' || inputs.environment == 'prod' }}
    environment: ${{ inputs.environment }}
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      aws-region: ${{ vars.AWS_REGION }}
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      ecs-cluster: ${{ vars.ECS_CLUSTER_NAME }}
      ecs-service: ${{ vars.ECS_SERVICE_NAME }}
      task-definition-family: ${{ vars.ECS_TASK_DEFINITION_FAMILY }}
      container-name: ingestor
      image-uri: ${{ inputs.image-uri }}
      verify-signature: true
      cosign-certificate-identity: ${{ vars.COSIGN_CERTIFICATE_IDENTITY }}
      cosign-certificate-oidc-issuer: https://token.actions.githubusercontent.com
