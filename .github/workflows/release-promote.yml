name: Release Promote

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service repository to promote
        required: true
        type: choice
        options:
          - all
          - ingestor
          - inference
          - analytics
          - processor
          - dashboard
      source-ref:
        description: Source image tag (for example sha-abc1234) or digest (sha256:...)
        required: true
        type: string
      target-tag:
        description: Target promotion tag (for example dev, prod)
        required: true
        type: string
      image-repository:
        description: ECR repository path (for example data-zoo/ingestor)
        required: false
        type: string
        default: ""
      environment:
        description: Target environment context for role/approvals
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    name: Resolve promotion targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve image repositories
        id: resolve
        run: |
          set -euo pipefail

          service="${{ inputs.service }}"
          image_repository_override="${{ inputs.image-repository }}"

          if [[ -n "$image_repository_override" && "$service" != "all" ]]; then
            matrix=$(jq -cn --arg repo "$image_repository_override" '[{"repository": $repo}]')
          else
            case "$service" in
              all)
                matrix='[
                  {"repository":"data-zoo/ingestor"},
                  {"repository":"data-zoo/inference"},
                  {"repository":"data-zoo/analytics"},
                  {"repository":"data-zoo/processor"},
                  {"repository":"data-zoo/dashboard"}
                ]'
                ;;
              ingestor)
                matrix='[{"repository":"data-zoo/ingestor"}]'
                ;;
              inference)
                matrix='[{"repository":"data-zoo/inference"}]'
                ;;
              analytics)
                matrix='[{"repository":"data-zoo/analytics"}]'
                ;;
              processor)
                matrix='[{"repository":"data-zoo/processor"}]'
                ;;
              dashboard)
                matrix='[{"repository":"data-zoo/dashboard"}]'
                ;;
              *)
                echo "Unsupported service: $service" >&2
                exit 1
                ;;
            esac
          fi

          echo "matrix=$(echo "$matrix" | jq -c '.')" >> "$GITHUB_OUTPUT"

  promote:
    name: Promote by Digest
    needs: prepare
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
    outputs:
      promoted-digest: ${{ steps.promote.outputs.promoted_digest }}
      promoted-uri: ${{ steps.promote.outputs.promoted_uri }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve and promote image by digest
        id: promote
        shell: bash
        run: |
          set -euo pipefail

          source_ref="${{ inputs.source-ref }}"
          target_tag="${{ inputs.target-tag }}"
          repo_name="${{ matrix.target.repository }}"
          registry="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"

          if [[ "${source_ref}" == sha256:* ]]; then
            source_digest="${source_ref}"
          else
            source_digest=$(aws ecr describe-images \
              --repository-name "${repo_name}" \
              --image-ids imageTag="${source_ref}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)
          fi

          if [[ -z "${source_digest}" || "${source_digest}" == "None" ]]; then
            echo "Source image not found for ref: ${source_ref}" >&2
            exit 1
          fi

          manifest=$(aws ecr batch-get-image \
            --repository-name "${repo_name}" \
            --image-ids imageDigest="${source_digest}" \
            --query 'images[0].imageManifest' \
            --output text)

          aws ecr put-image \
            --repository-name "${repo_name}" \
            --image-tag "${target_tag}" \
            --image-manifest "${manifest}" >/dev/null

          promoted_uri="${registry}/${repo_name}@${source_digest}"
          echo "promoted_digest=${source_digest}" >> "$GITHUB_OUTPUT"
          echo "promoted_uri=${promoted_uri}" >> "$GITHUB_OUTPUT"

      - name: Promotion summary
        run: |
          echo "### Release Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service selection: ${{ inputs.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repository: ${{ matrix.target.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source ref: ${{ inputs.source-ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target tag: ${{ inputs.target-tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Promoted digest: ${{ steps.promote.outputs.promoted_digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest URI: ${{ steps.promote.outputs.promoted_uri }}" >> "$GITHUB_STEP_SUMMARY"
