name: Release Preflight

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod
      require-backup-recency:
        description: Enforce backup recency check
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.14'
  PIP_VERSION: '26.0'
  UV_VERSION: '0.11.7'

jobs:
  preflight:
    name: Release preflight checks
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/data-pipeline-ci:latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6


      - name: Preflight migration and backup checks
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL_RAW }}
          BACKUP_LAST_SUCCESS_AT: ${{ vars.BACKUP_LAST_SUCCESS_AT }}
          BACKUP_MAX_AGE_HOURS: ${{ vars.BACKUP_MAX_AGE_HOURS }}
          REQUIRE_BACKUP_RECENCY: ${{ github.event_name == 'workflow_dispatch' && inputs.require-backup-recency || true }}
        run: |
          set -euo pipefail
          uv run python - <<'PYTHON'
          from __future__ import annotations

          import os
          from datetime import datetime, timezone

          import psycopg
          from alembic.config import Config
          from alembic.script import ScriptDirectory


          def fail(message: str) -> None:
              raise SystemExit(message)


          db_url = os.environ.get("DATABASE_URL_RAW", "").strip()
          if not db_url:
              fail("DATABASE_URL_RAW secret is required for release preflight checks.")

          cfg = Config("alembic.ini")
          script = ScriptDirectory.from_config(cfg)
          head_revision = script.get_current_head()

          conn = psycopg.connect(db_url)
          cur = conn.cursor()
          cur.execute("SELECT version_num FROM alembic_version")
          row = cur.fetchone()
          cur.close()
          conn.close()

          if row is None:
              fail("alembic_version table is missing or empty.")

          current_revision = row[0]
          if current_revision != head_revision:
              fail(
                  "Database is not at Alembic head. "
                  f"current={current_revision} head={head_revision}"
              )

          pending_count = 0 if current_revision == head_revision else 1

          require_backup = os.environ.get("REQUIRE_BACKUP_RECENCY", "true").lower() == "true"
          backup_last_success_at = os.environ.get("BACKUP_LAST_SUCCESS_AT", "").strip()
          backup_max_age_raw = os.environ.get("BACKUP_MAX_AGE_HOURS", "").strip()

          if require_backup:
              if not backup_last_success_at:
                  fail(
                      "BACKUP_LAST_SUCCESS_AT env var is required when backup recency is enforced."
                  )
              if not backup_max_age_raw:
                  fail(
                      "BACKUP_MAX_AGE_HOURS env var is required when backup recency is enforced."
                  )

              max_age_hours = int(backup_max_age_raw)
              last_success = datetime.fromisoformat(backup_last_success_at.replace("Z", "+00:00"))
              if last_success.tzinfo is None:
                  last_success = last_success.replace(tzinfo=timezone.utc)
              age_hours = (datetime.now(timezone.utc) - last_success).total_seconds() / 3600

              if age_hours > max_age_hours:
                  fail(
                      "Backup recency check failed. "
                      f"age_hours={age_hours:.2f} max_allowed={max_age_hours}"
                  )

          summary_lines = [
              "### Release Preflight",
              f"- Database connectivity: pass",
              f"- Current revision: {current_revision}",
              f"- Head revision: {head_revision}",
              f"- Pending migration count: {pending_count}",
              f"- Backup recency check enforced: {require_backup}",
          ]

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(summary_lines) + "\n")

          print("Preflight checks passed.")
          PYTHON

      - name: Configure AWS credentials (prod only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' }}
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify all service images exist in ECR (prod only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' }}
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_INGESTOR_URI: ${{ vars.ECR_INGESTOR_URI }}
          ECR_AI_GATEWAY_URI: ${{ vars.ECR_AI_GATEWAY_URI }}
          ECR_QUERY_API_URI: ${{ vars.ECR_QUERY_API_URI }}
          ECR_PROCESSOR_URI: ${{ vars.ECR_PROCESSOR_URI }}
          ECR_DASHBOARD_URI: ${{ vars.ECR_DASHBOARD_URI }}
        run: |
          set -euo pipefail
          uv run python - <<'PYTHON'
          from __future__ import annotations

          import os
          import shutil
          import subprocess
          import sys

          region = os.environ.get("AWS_REGION", "").strip()
          if not region:
              print("AWS_REGION not set; skipping ECR image existence check.")
              sys.exit(0)

          if not shutil.which("aws"):
              print("aws CLI not found in CI image; skipping ECR image existence check.")
              sys.exit(0)

          service_uris: dict[str, str] = {
              "ingestor": os.environ.get("ECR_INGESTOR_URI", "").strip(),
              "ai_gateway": os.environ.get("ECR_AI_GATEWAY_URI", "").strip(),
              "query_api": os.environ.get("ECR_QUERY_API_URI", "").strip(),
              "processor": os.environ.get("ECR_PROCESSOR_URI", "").strip(),
              "dashboard": os.environ.get("ECR_DASHBOARD_URI", "").strip(),
          }

          missing_vars = [svc for svc, uri in service_uris.items() if not uri]
          if missing_vars:
              print(
                  f"Missing ECR URI environment vars for: {', '.join(missing_vars)}. "
                  "Set ECR_<SERVICE>_URI in the GitHub environment.",
                  file=sys.stderr,
              )
              sys.exit(1)

          all_present = True
          for svc, uri in service_uris.items():
              image_ref = uri.split("/", 1)[-1] if "/" in uri else uri
              if ":" not in image_ref:
                  print(f"\u2717 {svc}: URI has no image tag \u2014 {uri}", file=sys.stderr)
                  all_present = False
                  continue
              repo_name, tag = image_ref.rsplit(":", 1)
              result = subprocess.run(
                  [
                      "aws", "ecr", "describe-images",
                      "--region", region,
                      "--repository-name", repo_name,
                      "--image-ids", f"imageTag={tag}",
                  ],
                  capture_output=True,
                  text=True,
              )
              if result.returncode == 0:
                  print(f"\u2713 {svc}: image confirmed in ECR ({uri})")
              else:
                  print(f"\u2717 {svc}: image NOT found in ECR ({uri})", file=sys.stderr)
                  all_present = False

          if not all_present:
              print(
                  "\nProd release blocked: one or more service images are missing from ECR.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("\nAll 5 service images confirmed present in ECR.")
          PYTHON
