      #   if: github.event_name == 'push'
      #   run: |
      #     ALB_URL="${{ secrets.DEV_ALB_URL }}"  # or PROD_ALB_URL for main
      #     curl --fail --retry 3 --retry-delay 5 "${ALB_URL}/health"
