name: Docker Build

# When you're ready to enable it later, just uncomment those lines.
on:
  # workflow_run:
  #  workflows: ["CI"]            # Trigger only after ci.yml completes
  #  branches: [main]
  #  types: [completed]           # Run whether CI passed or failed
  # Uncomment to also trigger manually or on tags
  # push:
  #   tags:
  #     - "v*"

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    # Skip if the triggering CI workflow failed
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      # Uncomment when pushing to container registry
      # packages: write

    steps:
      - uses: actions/checkout@v4

      # --- IMAGE BUILD & LOCAL TEST ---
      - name: Build Docker image
        run: |
          docker build \
            --tag data-pipeline-async:latest \
            --tag data-pipeline-async:${{ github.sha }} \
            .

      # Optional: Run smoke test inside the image
      - name: Verify image health endpoint
        run: |
          docker run --rm \
            --detach \
            --name smoke-test \
            data-pipeline-async:latest
          sleep 2
          # Note: This will fail without DB, expected behavior
          # curl http://localhost:8000/health || echo "Health check blocked (no DB, expected)"
          docker stop smoke-test || true

      # --- REGISTRY PUSH (FUTURE) ---
