name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service image to build
        required: true
        type: choice
        options:
          - all
          - ingestor
          - ai_gateway
          - query_api
          - processor
          - dashboard
      push_image:
        description: Push built image(s) to ECR
        required: true
        type: boolean
        default: false
      sign_image:
        description: Sign pushed image(s) with cosign
        required: true
        type: boolean
        default: true

concurrency:
  # One run per branch at a time; cancel in-flight on new push
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Read repo for checkout and build context

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

jobs:
  build-images:
    name: Build ${{ matrix.image.name }}
    strategy:
      matrix:
        image:
          - name: ingestor
            image_name: data-zoo/ingestor
            dockerfile: Dockerfile
          - name: ai_gateway
            image_name: data-zoo/ai_gateway
            dockerfile: services/ai_gateway/Dockerfile
          - name: query_api
            image_name: data-zoo/query_api
            dockerfile: services/query_api/Dockerfile
          - name: processor
            image_name: data-zoo/processor
            dockerfile: services/processor/Dockerfile
          - name: dashboard
            image_name: data-zoo/dashboard
            dockerfile: services/dashboard/Dockerfile
    if: ${{ inputs.service == 'all' || inputs.service == matrix.image.name }}
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      image-name: ${{ matrix.image.image_name }}
      dockerfile: ${{ matrix.image.dockerfile }}
      context: .
      aws-region: ${{ vars.AWS_REGION }}
      ecr-registry: ${{ env.ECR_REGISTRY }}
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      push-image: ${{ inputs.push_image }}
      sign-image: ${{ inputs.sign_image }}

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Report build matrix
        run: |
          echo "### Docker Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "Selected service scope: ${{ inputs.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Push mode: ${{ inputs.push_image && 'enabled' || 'disabled' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Signing mode: ${{ inputs.sign_image && 'enabled' || 'disabled' }}" >> "$GITHUB_STEP_SUMMARY"
