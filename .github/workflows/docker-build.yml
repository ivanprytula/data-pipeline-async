name: Docker Build

# Triggers:
#   push to main/develop → build only (ECR push disabled until CD is enabled)
#   PR to main/develop   → build only (validates Dockerfile)
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  # One run per branch at a time; cancel in-flight on new push
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Read repo for checkout and build context

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

jobs:
  build-ingestor:
    name: Build Ingestor
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      image-name: data-zoo/ingestor
      dockerfile: Dockerfile
      context: .
      aws-region: ${{ vars.AWS_REGION }}
      ecr-registry: ${{ env.ECR_REGISTRY }}
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      push-image: false

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build-ingestor
    steps:
      - name: Report image uri
        run: |
          echo "### Docker Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ needs.build-ingestor.outputs.image-uri }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Push mode: disabled (CI build-only)" >> "$GITHUB_STEP_SUMMARY"
