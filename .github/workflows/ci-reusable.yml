name: CI Reusable

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use.
        required: false
        type: string
        default: "3.14"
      run-integration:
        description: Run integration tests with Postgres service.
        required: false
        type: boolean
        default: true
      run-migrations:
        description: Run Alembic migration verification.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv==0.11.7
          uv sync --frozen

      - name: Ruff lint + format check
        run: |
          uv run ruff check .
          uv run ruff format --check .

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv==0.11.7
          uv sync --frozen

      - name: Run unit tests
        run: uv run pytest -q -m "unit"

  integration:
    name: Integration Tests
    if: ${{ inputs.run-integration }}
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_database"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv==0.11.7
          uv sync --frozen

      - name: Wait for Postgres
        run: |
          for _ in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break
            sleep 1
          done

      - name: Run integration tests
        env:
          DATABASE_URL_TEST: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/test_database
        run: uv run pytest -q -m "integration"

  migrations:
    name: Migration Verification
    if: ${{ inputs.run-migrations }}
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: data_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d data_pipeline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv==0.11.7
          uv sync --frozen

      - name: Verify migrations
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/data_pipeline
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
