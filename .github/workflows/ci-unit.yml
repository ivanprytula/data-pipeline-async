name: CI 01 — Unit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: ci-unit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Read repo for checkout; no other permissions needed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    name: Quality checks — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip / uv wheel (keyed by uv.lock)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip/wheels
          key: ${{ runner.os }}-pip-uv-0.11.7-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-uv-0.11.7-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-uv-0.11.7-
            ${{ runner.os }}-pip-

      - name: Install `uv` and sync dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv==0.11.7
          uv sync --frozen

      - name: Run quality checks
        run: |
          uv run ruff check .
          uv run ruff format --check .

  unit:
    name: Unit tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip / uv wheel (keyed by uv.lock)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip/wheels
          key: ${{ runner.os }}-pip-uv-0.11.7-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-uv-0.11.7-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-uv-0.11.7-
            ${{ runner.os }}-pip-

      - name: Install `uv` and sync dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv==0.11.7
          uv sync --frozen

      - name: Cache pytest results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pytest-

      - name: Run unit tests
        run: uv run pytest -q -m "unit"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-unit-py${{ matrix.python-version }}
          path: htmlcov
