name: CI — Unit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-unit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Read repo for checkout; no other permissions needed

jobs:
  unit:
    name: Unit tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip / uv wheel (keyed by uv.lock)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4.0.0
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip/wheels
          key: ${{ runner.os }}-pip-uv-0.11.7-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-uv-0.11.7-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-uv-0.11.7-
            ${{ runner.os }}-pip-

      - name: Install `uv` and sync dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv==0.11.7
          uv sync --frozen

      - name: Cache pytest results
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4.0.0
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pytest-

      - name: Run unit tests
        run: uv run pytest -q -m "unit"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.5.0
        with:
          name: coverage-unit-py${{ matrix.python-version }}
          path: htmlcov
