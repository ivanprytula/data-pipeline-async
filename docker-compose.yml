# Base configuration shared across all environments
services:
  db:
    build:
      context: ./infra/database
      dockerfile: Dockerfile
    container_name: data-pipeline-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_pipeline
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/database/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./infra/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    # K8s-like resource management (overridden per environment)
    deploy:
      # Restart policy (matches k8s restartPolicy)
      restart_policy:
        condition: on-failure        # on-failure | any | none
        delay: 5s                    # Delay before restart
        max_attempts: 5              # Max restart attempts (0 = unlimited)
        window: 120s                 # Observation window

      # Resource constraints (matches k8s requests/limits)
      resources:
        # Minimum guaranteed (k8s requests → docker-compose reservations)
        reservations:
          cpus: '0.5'
          memory: '512M'
        # Hard limits (k8s limits → docker-compose limits)
        limits:
          cpus: '1.0'
          memory: '1G'

  db-test:
    build:
      context: ./infra/database
      dockerfile: Dockerfile
    container_name: data-pipeline-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_database
    ports:
      - '5433:5432'
    volumes:
      - pg_test_data:/var/lib/postgresql/data
      - ./infra/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: ["postgres"]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    profiles:
      - test
    # K8s-like resource management
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.25'
          memory: '256M'
        limits:
          cpus: '0.5'
          memory: '512M'

  redis:
    image: redis:7-alpine
    container_name: data-pipeline-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    # K8s-like resource management
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.1'
          memory: '128M'
        limits:
          cpus: '0.25'
          memory: '256M'

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: data-pipeline-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - '9092:9092'   # host access (rpk, local dev)
      - '8082:8082'   # Pandaproxy / admin UI
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.25'
          memory: '256M'
        limits:
          cpus: '0.5'
          memory: '512M'

  app:
    build: .
    container_name: data-pipeline-app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/data_pipeline
      KAFKA_BROKER_URL: redpanda:29092
      KAFKA_ENABLED: "true"
      MONGO_URL: mongodb://mongodb:27017
      MONGO_ENABLED: "true"
      AI_GATEWAY_URL: http://ai-gateway:8001
      OTEL_ENABLED: "true"
      OTEL_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ingestor
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ['CMD', 'curl', '-f', '-s', 'http://localhost:8000/readyz']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
    # K8s-like resource management (overridden per environment)
    deploy:
      # Restart policy
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

      # Resource constraints (matches k8s requests/limits)
      resources:
        reservations:
          cpus: '0.25'
          memory: '256M'
        limits:
          cpus: '0.5'
          memory: '512M'

  mongodb:
    image: mongo:7
    container_name: data-pipeline-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.25'
          memory: '256M'
        limits:
          cpus: '0.5'
          memory: '512M'

  qdrant:
    image: qdrant/qdrant:latest
    container_name: data-pipeline-qdrant
    ports:
      - '6333:6333'    # gRPC and HTTP API
      - '6334:6334'    # Web UI (optional)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_LOG_LEVEL: info
    healthcheck:
      test: ['CMD', 'curl', '-f', '-s', 'http://localhost:6333/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.25'
          memory: '256M'
        limits:
          cpus: '0.5'
          memory: '512M'

  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    container_name: data-pipeline-processor
    environment:
      KAFKA_BROKER_URL: redpanda:29092
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: processor
    depends_on:
      redpanda:
        condition: service_healthy
      jaeger:
        condition: service_started
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        reservations:
          cpus: '0.1'
          memory: '64M'
        limits:
          cpus: '0.25'
          memory: '128M'

  ai-gateway:
    build:
      context: services/ai-gateway
      dockerfile: Dockerfile
    container_name: data-pipeline-ai-gateway
    environment:
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: info
    ports:
      - '8001:8001'
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', '-s', 'http://localhost:8001/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action: sync+restart
          path: ./services/ai-gateway
          target: /app
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.5'
          memory: '512M'
        limits:
          cpus: '1.0'
          memory: '1G'

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: data-pipeline-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - '16686:16686'  # Jaeger UI
      - '4317:4317'    # OTLP gRPC receiver
      - '4318:4318'    # OTLP HTTP receiver
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:16686']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.1'
          memory: '128M'
        limits:
          cpus: '0.25'
          memory: '256M'

  query-api:
    build:
      context: .
      dockerfile: services/query-api/Dockerfile
    container_name: data-pipeline-query-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/data_pipeline
      LOG_LEVEL: info
    ports:
      - '8005:8005'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', '-s', 'http://localhost:8005/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync+restart
          path: ./services/query-api
          target: /app/services/query-api
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        reservations:
          cpus: '0.25'
          memory: '256M'
        limits:
          cpus: '0.5'
          memory: '512M'

volumes:
  pg_data:
  pg_test_data:
  mongo_data:
  qdrant_data:
