# PostgreSQL managed authentication (pg_hba.conf)
#
# Auth strategy:
#   local / 127.0.0.1 / ::1  → trust  (Unix socket + loopback inside container)
#   172.16.0.0/12            → scram-sha-256  (Docker bridge: host CLI, CI runners)
#   0.0.0.0/0                → reject  (deny everything else)
#
# Dev/prod parity: use scram-sha-256 for all TCP connections (same as prod).
# Only loopback inside the container gets trust (pg_isready health checks).

# Unix socket + loopback inside container (health checks, pg_isready)
local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Docker bridge network — host CLI, CI runners, alembic from host
# scram-sha-256 = same auth method as production
host    all             all             172.16.0.0/12           scram-sha-256

# Deny all other connections
host    all             all             0.0.0.0/0               reject

# Replication
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
