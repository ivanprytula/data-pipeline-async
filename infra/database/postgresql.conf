# Custom postgresql.conf for observability, profiling, and performance tuning
# Place in infra/database/postgresql.conf

# Load extensions for monitoring and profiling
shared_preload_libraries = 'pg_stat_statements,auto_explain'

# pg_stat_statements settings
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# auto_explain settings (log slow queries, enable detailed plans)
auto_explain.log_min_duration = 500  # ms
auto_explain.log_analyze = true
auto_explain.log_buffers = true
auto_explain.log_timing = true
auto_explain.log_triggers = true
auto_explain.log_verbose = true
auto_explain.log_nested_statements = true

# Memory and performance tuning (example values, adjust for your workload)
work_mem = 16MB
maintenance_work_mem = 64MB
shared_buffers = 256MB
effective_cache_size = 512MB
max_connections = 50

# Logging
log_min_duration_statement = 500  # ms (log queries slower than 500ms)
log_statement = 'ddl'  # log DDL statements (CREATE, ALTER, DROP, etc.)
log_lock_waits = on  # log queries waiting on locks (contention indicator)
log_temp_files = 0  # log temporary files created during queries (0 = log all)

# Future extension: add more shared_preload_libraries as needed
# e.g., 'pg_stat_kcache,pg_stat_plans,pg_hint_plan'
