worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream="$upstream_addr"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ─── Upstreams ───────────────────────────────────────────────────────────────
    upstream ingestor       { server ingestor:8000; }
    upstream ai_gateway     { server ai-gateway:8001; }
    upstream dashboard      { server dashboard:8003; }
    upstream query_api      { server query-api:8005; }
    upstream jaeger         { server jaeger:16686; }
    upstream redpanda       { server redpanda:8082; }
    upstream qdrant         { server qdrant:6333; }
    upstream prometheus     { server prometheus:9090; }
    upstream grafana        { server grafana:3000; }
    upstream alertmanager   { server alertmanager:9093; }

    # ─── HTTP server (redirect to HTTPS) ─────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host:443$request_uri;
    }

    # ─── HTTPS server (main entrypoint: localhost:443) ──────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost;

        # ── SSL certificates (generated by mkcert, mounted from host) ─────────
        ssl_certificate /etc/nginx/certs/localhost+2.pem;
        ssl_certificate_key /etc/nginx/certs/localhost+2-key.pem;

        # ── Modern SSL settings ───────────────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Dashboard (root) ──────────────────────────────────────────────────
        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # SSE (Server-Sent Events) support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── Ingestor API v1/v2 ────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://ingestor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;

            # Expose OpenAPI docs
            location /api/docs {
                proxy_pass http://ingestor/docs;
            }
            location /api/redoc {
                proxy_pass http://ingestor/redoc;
            }
            location /api/openapi.json {
                proxy_pass http://ingestor/openapi.json;
            }
        }

        # ── Ingestor health + metrics (direct passthrough) ───────────────────
        location ~ ^/(healthz|readyz|metrics) {
            proxy_pass http://ingestor;
            proxy_set_header Host $host;
        }

        # ── Analytics / Query API ─────────────────────────────────────────────
        location /analytics/ {
            proxy_pass http://query_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── AI Gateway (embeddings + semantic search) ─────────────────────────
        location /search/ {
            proxy_pass http://ai_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Jaeger tracing UI ─────────────────────────────────────────────────
        location /jaeger/ {
            proxy_pass http://jaeger/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            # WebSocket support for live trace updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Redpanda admin / Pandaproxy UI ────────────────────────────────────
        location /redpanda/ {
            proxy_pass http://redpanda/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Qdrant vector DB UI ───────────────────────────────────────────────
        location /qdrant/ {
            proxy_pass http://qdrant/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Prometheus ────────────────────────────────────────────────────────
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            # Rewrite Prometheus's own internal links so they work under /prometheus/
            sub_filter_once off;
            sub_filter 'href="/' 'href="/prometheus/';
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            # WebSocket for live dashboard updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Alertmanager ─────────────────────────────────────────────────────
        location /alertmanager/ {
            proxy_pass http://alertmanager/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Nginx status (health check endpoint for nginx itself) ─────────────
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.0.0.0/8;   # Docker network
            deny all;
        }
    }
}
