replicaCount: 1

image:
  repository: data-zoo/dashboard
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8003

probes:
  liveness:
    path: /health
  readiness:
    path: /readyz

startup:
  failureThreshold: 6
  periodSeconds: 10

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

env:
  environment: local

configmap:
  name: data-zoo-app-config
  ingestorUrlKey: ingestor_url
