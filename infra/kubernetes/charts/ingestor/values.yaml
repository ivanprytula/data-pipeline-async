replicaCount: 1

image:
  repository: data-zoo/ingestor
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

probes:
  liveness:
    path: /health
  readiness:
    path: /readyz

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  environment: local

secrets:
  name: data-zoo-app-secrets
  databaseUrlKey: database_url
