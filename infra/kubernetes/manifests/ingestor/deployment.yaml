apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor
  labels:
    app.kubernetes.io/name: ingestor
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingestor
        app.kubernetes.io/component: api
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: ingestor
          image: data-zoo/ingestor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: data-zoo-app-secrets
                  key: database_url
            - name: ENVIRONMENT
              value: local
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
