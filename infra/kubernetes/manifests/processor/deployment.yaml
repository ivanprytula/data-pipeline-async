apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  annotations:
    data-zoo/replica-constraint: "single-consumer; scale by increasing topic partitions first"
  labels:
    app.kubernetes.io/name: processor
    app.kubernetes.io/component: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: processor
        app.kubernetes.io/component: consumer
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: processor
          image: data-zoo/processor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: data-zoo-app-secrets
                  key: kafka_bootstrap_servers
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: data-zoo-app-config
                  key: kafka_topic
            - name: ENVIRONMENT
              value: local
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 18
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
